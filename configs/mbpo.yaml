algo: mbpo
seed: 0
device: auto

env:
  env_id: "Hopper-v4"
  max_episode_steps: 1000
  obs_norm: false
  eval_seed: 10000
  render: false           # render train env window; keep false for headless / faster runs

sac:
  gamma: 0.99
  tau: 0.005
  lr_actor: 3.0e-4
  batch_size: 128
  replay_capacity: 200_000
  warmup_steps: 10_000
  hidden: [256, 256]

model:
  n_members: 7
  hidden: [200, 200, 200, 200]
  refit_every: 250            # env steps between ensemble refits
  holdout_frac: 0.2
  rollout_M: 400              # branched rollouts per refit cycle
  real_ratio: 0.10            # fraction of SAC batch drawn from D_env
  updates_G: 8                # SAC updates per env step

exploration:
  kind: pink                  # deterministic | white | pink
  scale: 0.05

train:
  total_env_steps: 500_000
  log_every: 1_000
  eval_every: 10_000
  eval_episodes: 30
  video_every: 100_000      # mp4 every N env steps (+ final step if not divisible)
  video_episodes: 1        # episodes rolled into each mp4

paths:
  run_dir: "runs/mbpo_seed{seed}"
