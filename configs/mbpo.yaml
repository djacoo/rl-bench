algo: mbpo
seed: 0
device: auto

env:
  env_id: "LunarLanderContinuous-v3"
  max_episode_steps: 1000
  obs_norm: true
  eval_seed: 10000

sac:
  gamma: 0.99
  tau: 0.005
  lr_actor: 3.0e-4
  lr_critic: 3.0e-4
  lr_alpha: 3.0e-4
  batch_size: 256
  replay_capacity: 200_000
  warmup_steps: 5_000
  hidden: [256, 256]

model:
  n_members: 7
  n_elites: 5
  hidden: [200, 200, 200, 200]
  refit_every: 250            # env steps between ensemble refits
  max_refit_samples: 40_000   # cap on training samples per refit
  holdout_frac: 0.2
  rollout_M: 400              # branched rollouts per refit cycle
  rollout_horizon: 1          # fixed horizon (MBPO classic)
  real_ratio: 0.10            # fraction of SAC batch drawn from D_env
  model_buf_capacity: 50_000
  updates_G: 8                # SAC updates per env step

exploration:
  kind: pink                  # deterministic | white | pink
  scale: 0.05

train:
  total_env_steps: 200_000
  log_every: 1_000
  ckpt_every: 25_000
  eval_every: 10_000
  eval_episodes: 30
  live_plot: true

paths:
  run_dir: "runs/mbpo_seed{seed}"
