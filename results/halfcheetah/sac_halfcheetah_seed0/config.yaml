algo: sac
seed: 0
device: auto
env:
  env_id: HalfCheetah-v5
  max_episode_steps: 1000
  obs_norm: true
  eval_seed: 10000
  render: false
sac:
  gamma: 0.99
  tau: 0.005
  lr_actor: 0.0003
  lr_critic: 0.0003
  lr_alpha: 0.0003
  batch_size: 128
  replay_capacity: 1000000
  warmup_steps: 5000
  hidden:
  - 256
  - 256
exploration:
  kind: pink
  scale: 0.05
train:
  total_env_steps: 300000
  updates_per_step: 1
  log_every: 1000
  ckpt_every: 25000
  eval_every: 10000
  eval_episodes: 10
  live_plot: false
  video_every: 100000
  video_episodes: 1
paths:
  run_dir: runs/sac_halfcheetah_seed{seed}
